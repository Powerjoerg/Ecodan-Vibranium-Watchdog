# ==============================================================================
# MITSUBISHI ECODAN WP PACKAGE - VIBRANIUM ULTRA KOMPLETT
# INKLUSIVE MODBUS A1M HARDWARE, TEMPLATES UND AUTOMATIONEN
# PLUS: DYNAMISCHES ENERGIEMANAGEMENT & URLAUBSMODUS V3
#
# --- VERSIONS-HISTORIE ---
# 🟢 AKTUELL: 30.04.2026 - V5.4 (Urlaub Status Bugfix)
# ==============================================================================
# 
# 🚨 DIE 4 GOLDENEN REGELN (NIEMALS BRECHEN!) 🚨
#
# 1. Das "Single-Source-of-Truth" Prinzip (Nur ein Chef!)
#    Physische Hardware (Shelly IN1, Modbus-Register) darf IMMER NUR von EINER
#    einzigen Master-Automation (dem Watchdog) geschrieben werden. Alle anderen
#    Automationen (Boost, Urlaub, Preis) reichen nur "Anträge" (Input Booleans)
#    ein. Der Watchdog fällt das finale Urteil.
#
# 2. Zustand statt Moment (Der "Self-Healing" Trigger)
#    Baue sicherheitskritische Schalter IMMER als Zustandsmaschine. Wenn im 
#    Moment des Schaltens das WLAN wegbricht, darf die Maschine nicht sterben.
#    Nutze Polling (/10 Min) oder Dirty Flags, damit das System sich ständig
#    selbst korrigiert: "Stimmt der Schalter noch mit der Logik überein?"
#
# 3. Entkopplung von Ursache und Wirkung (Keine direkten Drähte)
#    Ein einzelnes Thermostat hat NICHT das Recht, der 14kW WP den Stecker zu 
#    ziehen. Es meldet nur seinen Zustand. Die Abschaltung entscheidet allein 
#    die übergeordnete Logik (Haus + Puffer + PV).
#
# 4. Der "Edge-Case" Extremtest (Zwangssimulation)
#    Vor jedem Speichern prüfen:
#    - PV 100%, aber Puffer kochend heiß (65°C)? -> Failsafe greift?
#    - Alle Thermostate OFF, aber Puffer eiskalt (30°C)? -> Frostschutz aktiv?
#    - Haus friert, aber Strompreis extrem teuer (50 ct)? -> Notbetrieb?
#    Wenn eine Antwort "Kurzzyklus" oder "kalte Dusche" ist = NICHT SPEICHERN!
# ==============================================================================

input_boolean:
  mpc_foxess_tuersteher:
    name: "FoxESS Diebstahlschutz"
    icon: mdi:shield-car

  wp_boost_aktiv:
    name: "WP Boost Flag"
    icon: mdi:fire
    
  wp_boost_freigabe:
    name: "PV-Boost Automatik"
    icon: mdi:solar-power

input_number:
  dummy_strompreis:
    name: "Test: Strompreis"
    min: 0
    max: 50
    step: 0.5
    initial: 25
    unit_of_measurement: "ct/kWh"
    icon: mdi:cash
    
  dummy_solar_prognose:
    name: "Test: Solar-Prognose"
    min: 0
    max: 100
    step: 1
    initial: 30
    unit_of_measurement: "kWh"
    icon: mdi:solar-power

input_datetime:
  wp_urlaub_rueckkehr:
    name: "Rückkehrdatum WP"
    has_date: true
    has_time: false
    icon: mdi:calendar-end

input_select:
  mitsubishi_wp_translations_language:
    name: "Mitsubishi WP: Translations Language"
    options:
      - en
      - de
    initial: de
    
  wp_urlaubsmodus:
    name: "WP Betriebsmodus"
    icon: mdi:heat-pump
    options:
      - "Normalbetrieb"
      - "Sommerbetrieb (Nur Warmwasser)"
      - "Sommer-Urlaub (WP AUS)"
      - "Winter-Urlaub (Minimal 45°C)"

counter:
  wp_starts_heute:
    name: "WP Starts Heute"
    icon: mdi:restart
  wp_abtauzyklen_heute:
    name: "WP Abtauzyklen Heute"
    icon: mdi:snowflake-melt
  wp_kurzzyklen_heute:
    name: "WP Kurzzyklen Heute"
    icon: mdi:alert-circle-outline

utility_meter:
  wp_tagesverbrauch_kategorisiert:
    source: sensor.shellypro3em_e08cfe95cbe0_total_active_energy
    name: "WP Tagesverbrauch Kategorisiert"
    cycle: daily
    tariffs:
      - pflicht_betrieb
      - luxus_boost

  hausbedarf_taeglich_bereinigt:
    source: sensor.hausbedarf_heute_bereinigt
    name: "Hausbedarf Taeglich Bereinigt"
    cycle: daily

modbus:
  - name: mitsubishi-a1m
    type: serial
    port: /dev/ttyUSB0
    baudrate: 9600
    bytesize: 8
    parity: N
    stopbits: 1
    method: rtu
    timeout: 2

    binary_sensors:
      - name: "Mitsubishi WP: Wasserpumpe 1"
        address: 21
        scan_interval: 60
        input_type: discrete_input
        device_class: running
        unique_id: mitsubishi_wp_wasserpumpe_1

      - name: "Mitsubishi WP: Wasserpumpe 2"
        address: 22
        scan_interval: 60
        input_type: discrete_input
        device_class: running
        unique_id: mitsubishi_wp_wasserpumpe_2

    sensors:
      - name: "Mitsubishi WP: Fehlercode Gateway (raw)"
