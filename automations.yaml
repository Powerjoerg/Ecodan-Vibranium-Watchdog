# ==========================================
# WEIHNACHTSBELEUCHTUNG
# ==========================================
- id: weihnachtsbeleuchtung_17_an
  alias: Weihnachtsbeleuchtung 17 Uhr AN
  triggers:
  - at: '17:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_on
  mode: single

- id: weihnachtsbeleuchtung_22_aus
  alias: Weihnachtsbeleuchtung 22 Uhr AUS
  triggers:
  - at: '22:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: group.weihnachtsbeleuchtung
    action: homeassistant.turn_off
  mode: single

# ==========================================
# WP TAKTUNG & MONITORING
# ==========================================
- id: wp_taktung_zaehlen
  alias: WP Taktung - Start zählen
  description: Zählt jeden WP-Start wenn Verdichter über 5 Hz geht
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 5
    for:
      minutes: 1
    trigger: numeric_state
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.increment
  mode: single

- id: wp_taktung_reset
  alias: WP Taktung - Reset Mitternacht
  description: Setzt den WP-Start-Zähler jeden Tag um Mitternacht zurück
  triggers:
  - at: '00:00:00'
    trigger: time
  conditions: []
  actions:
  - target:
      entity_id: counter.wp_starts_heute
    action: counter.reset
  mode: single

# ==========================================
# WP PV-BOOST LOGIK
# ==========================================
- id: wp_boost_aktivieren
  alias: WP Boost bei PV-Überschuss aktivieren
  description: Boost auf 60°C wenn WP läuft, PV-Überschuss vorliegt und Batterie > 80%
  triggers:
  - entity_id: sensor.mitsubishi_wp_warmepumpe_frequenz
    above: 5
    for:
      minutes: 2
    trigger: numeric_state
  conditions:
  - condition: numeric_state
    entity_id: sensor.feed_in
    above: 0.5
  - condition: numeric_state
    entity_id: sensor.battery_soc_1
    above: 80
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'off'
  - condition: time
    after: '07:00:00'
    before: '21:00:00'
  actions:
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_on
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 6000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 60
    action: input_number.set_value
  - action: notify.persistent_notification
    data:
      title: WP Boost aktiv
      message: >
        Soll auf 60°C gesetzt. PV-Einspeisung: {{ states('sensor.feed_in') }} kW.
  mode: single

- id: wp_boost_beenden
  alias: WP Boost beenden
  description: Zurück auf 50°C
  triggers:
  - at: '21:00:00'
    trigger: time
  - entity_id: sensor.battery_soc_1
    below: 75
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: input_boolean.wp_boost_aktiv
    state: 'on'
  actions:
  - action: modbus.write_register
    data:
      hub: mitsubishi-a1m
      slave: 1
      address: 30
      value: 5000
  - target:
      entity_id: input_number.wp_soll_temperatur
    data:
      value: 50
    action: input_number.set_value
  - target:
      entity_id: input_boolean.wp_boost_aktiv
    action: input_boolean.turn_off
  mode: single

# ==========================================
# WP THERMOSTAT STEUERUNG (IN1)
# ==========================================
- id: wp_thermostat_heizbedarf_an
  alias: WP Thermostat - Heizbedarf AN
  description: Shelly ON wenn Raum unter Soll UND TWW über 40°C
  triggers:
  - entity_id: sensor.wp_heizbedarf
    to: 'True'
    for:
      minutes: 1
    trigger: state
  conditions:
  - condition: numeric_state
    entity_id: sensor.mitsubishi_wp_isttemperatur_wasserspeicher_tww
    above: 40
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_on
  mode: single

- id: wp_thermostat_heizbedarf_aus
  alias: WP Thermostat - Heizbedarf AUS
  description: Shelly OFF wenn kein Bedarf (5 Min Verzögerung)
  triggers:
  - entity_id: sensor.wp_heizbedarf
    to: 'False'
    for:
      minutes: 5
    trigger: state
  conditions: []
  actions:
  - target:
      entity_id: switch.wp_thermostat_in_1
    action: switch.turn_off
  mode: single

# ==========================================
# WP NACHTABSENKUNG (STAFFELIERT)
# ==========================================
- id: wp_nachtabsenkung_start
  alias: WP Nachtabsenkung Start (21 Uhr)
  triggers:
  - at: '21:00:00'
    trigger: time
  actions:
  - action: climate.set_temperature
    data: {temperature: 18}
    target: {entity_id: climate.st1820_80b54e38809c}
  - delay: "00:15:00"
  - action: climate.set_temperature
    data: {temperature: 19}
    target: {entity_id: climate.st1820_b08184f2dbc8}
  # ... weitere Räume analog staffeln ...
  mode: single

# ==========================================
# ZAPPI SMART CHARGING (FORD KUGA)
# ==========================================
- id: zappi_smart_charge_solar
  alias: Zappi - Laden starten bei PV-Überschuss (Tags)
  description: Nutzt ECO+ wenn Sonne da und Hausbatterie > 80%
  triggers:
  - entity_id: sensor.feed_in
    above: 1.4
    for:
      minutes: 5
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: sensor.myenergi_zappi_15553841_plug_status
    state: 'Connected'
  - condition: numeric_state
    entity_id: sensor.battery_soc_1
    above: 80
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: ECO+
    action: select.select_option
  mode: single

- id: zappi_smart_charge_night
  alias: Zappi - Nacht-Ladung (Günstiger Tarif)
  description: Schaltet auf FAST um 01:00 Uhr
  triggers:
  - at: '01:00:00'
    trigger: time
  conditions:
  - condition: state
    entity_id: sensor.myenergi_zappi_15553841_plug_status
    state: 'Connected'
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: FAST
    action: select.select_option
  mode: single

- id: zappi_smart_charge_stop
  alias: Zappi - Ladung beenden (Morgens / Standby)
  description: Stoppt Ladung um 07:00 Uhr
  triggers:
  - at: '07:00:00'
    trigger: time
  - platform: sun
    event: sunset
  conditions: []
  actions:
  - target:
      entity_id: select.myenergi_zappi_15553841_charge_mode
    data:
      option: 'Off'
    action: select.select_option
  mode: single

